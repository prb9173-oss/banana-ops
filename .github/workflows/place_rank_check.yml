name: Place Rank Check

on:
  # 매일 자동 실행은 GitHub 자체 schedule 대신 외부 서비스(cron-job.org)가
  # 이 워크플로우의 workflow_dispatch를 API로 호출하는 방식으로 처리한다.
  # GitHub의 schedule 트리거는 최대 3시간 넘게 지연되는 등 신뢰할 수 없어서
  # (2026-07-24 실측) 아예 빼뒀다 — 여기 다시 추가하지 말 것.
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run place rank check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/check_place_rank.py
