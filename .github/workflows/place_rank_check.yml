name: Place Rank Check

on:
  # 매일 한국시간 09:00(UTC 00:00)에 자동 실행. 수동 실행도 그대로 남겨둔다.
  # 참고: GitHub Actions의 schedule은 "정확히 그 시각"을 보장하지 않고
  # 몇 분(드물게 그 이상) 늦게 시작될 수 있다.
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run place rank check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/check_place_rank.py
