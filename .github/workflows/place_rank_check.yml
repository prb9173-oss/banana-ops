name: Place Rank Check

on:
  # 임시로 11:00 KST(UTC 02:00)로 맞춰서 스케줄 트리거가 실제로 도는지 테스트 중.
  # 확인되면 원래 목표 시각인 09:00 KST(UTC 00:00)로 되돌릴 것.
  # 참고: GitHub Actions의 schedule은 "정확히 그 시각"을 보장하지 않고
  # 몇 분(드물게 그 이상) 늦게 시작될 수 있다.
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run place rank check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/check_place_rank.py
